<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Frontend Mentor | Browser extensions manager UI</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    @font-face {
      font-family: 'NotoSans';
      src: url('./assets/fonts/NotoSans-VariableFont_wdth\,wght.ttf');
    }

    :root {
      --background-color: linear-gradient(180deg, #040918 0%, #091540 100%);
      --text-color: hsl(200, 60%, 99%);
      --paragraph-text: hsl(0, 0%, 78%);
      --card-background: hsl(226, 25%, 17%);
      --card-border: hsl(225, 23%, 24%);
      --button-background: hsl(225, 23%, 24%);
      --tabs-buttons-background: hsl(225, 23%, 24%);
    }

    body {
      margin: 0%;
      padding: 0%;
      box-sizing: border-box;
      font-family: "NotoSans";
    }

    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }

    .extention {
      width: 100%;
      min-height: 100dvh;
      background: var(--background-color);
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
    }

    .px-8{
      padding: 0 2rem;
    }

    .flex {
      display: flex;
    }

    .row {
      flex-direction: row;
    }

    .column {
      flex-direction: column;
    }

    .justify-start {
      justify-content: start;
    }

    .justify-center {
      justify-content: center;
    }

    .justify-end {
      justify-content: end;
    }

    .justify-between {
      justify-content: space-between;
    }

    .justify-around {
      justify-content: space-around;
    }

    .justify-evenly {
      justify-content: space-evenly;
    }

    .item-start {
      align-items: start;
    }

    .item-center {
      align-items: center;
    }

    .item-end {
      align-items: end;
    }

    .item-between {
      align-items: space-between;
    }

    .item-around {
      align-items: space-around;
    }

    .item-evenly {
      align-items: space-evenly;
    }

    .w-100 {
      width: 100%;
    }

    /* New utility classes */
    .h-100 {
      height: 100%;
    }

    .gap-1 {
      gap: 0.25rem;
    }

    .gap-2 {
      gap: 0.5rem;
    }

    .gap-3 {
      gap: 0.75rem;
    }

    .gap-4 {
      gap: 1rem;
    }

    .p-1 {
      padding: 0.25rem;
    }

    .p-2 {
      padding: 0.5rem;
    }

    .m-auto {
      margin: auto;
    }

    .text-center {
      text-align: center;
    }

    .rounded {
      border-radius: 0.5rem;
    }

    .hidden {
      display: none;
    }

    .block {
      display: block;
    }

    .inline-block {
      display: inline-block;
    }

    .grid {
      display: grid;
    }

    .relative {
      position: relative;
    }

    .absolute {
      position: absolute;
    }

    .overflow-hidden {
      overflow: hidden;
    }

    .cursor-pointer {
      cursor: pointer;
    }

    .opacity-50 {
      opacity: 0.5;
    }

    .transition {
      transition: all 0.3s ease;
    }

    .paragraph-color {
      color: var(--paragraph-text);
    }

    .card-here {
      display: flex;
      flex-direction: column;
      gap: 3rem;
      background-color: var(--card-background);
      padding: 1.5rem;
      border-radius: 1.5rem;
      border: 1px solid var(--card-border);
    }

    .remove-button {
      color: var(--text-color);
      font-size: 1rem;
      background-color: var(--card-background);
      border-radius: 2rem;
      border: 1px solid var(--card-border);
      padding: 0.5rem 1rem;
    }

    /* The switch - the box around the slider */
    .switch {
      position: relative;
      display: inline-block;
      width: 42px;
      height: 24px;
    }

    /* Hide default HTML checkbox */
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    /* The slider */
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--card-border);
      -webkit-transition: .4s;
      transition: .4s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      -webkit-transition: .4s;
      transition: .4s;
    }

    input:checked+.slider {
      background-color: hsl(3, 71%, 56%);
    }

    input:focus+.slider {
      box-shadow: 0 0 1px hsl(3, 71%, 56%);
    }

    input:checked+.slider:before {
      -webkit-transform: translateX(18px);
      -ms-transform: translateX(18px);
      transform: translateX(18px);
    }

    /* Rounded sliders */
    .slider.round {
      border-radius: 34px;
    }

    .slider.round:before {
      border-radius: 50%;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 3.5rem;
    }

    .title {
      width: 100%;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      background-color: var(--card-background);
      padding: 0.75rem;
      border-radius: 1rem;
    }

    .theme-button {
      background-color: var(--button-background);
      padding: 0.75rem;
      border-radius: 0.75rem;
    }

    .card-tab-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    .tabs-section {
      width: 100%;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
    }

    .heading {
      color: var(--text-color);
      font-weight: bold;
      font-size: 2.25rem;
    }

    .tabs-container {
      display: flex;
      gap: 0.5rem;
    }

    .card-heading {
      color: var(--text-color);
      font-weight: bold;
      font-size: 1.25rem;
    }

    .tabs-buttons {
      background-color: var(tabs-buttons-background);
      border-radius: 2rem;
      padding: 0.5rem 1rem;
      font-weight: 400;
      color: white;
    }

    @media (max-width:375px) {

      .extention {
        padding: 1rem;
      }

      .row {
        gap: 2rem;
      }

      .tabs-section {
        flex-direction: column;
        gap: 1rem;
      }

      .card-here {
        padding: 1rem;
      }
    }
  </style>
</head>

<body>
  <section class="extention py-8">
    <div class="container">
      <div class="row">
        <div class="title">
          <img src="./assets/images/logo.svg" alt="logo">
          <button class="theme-button" id="theme-button">
            <img src="./assets/images/icon-sun.svg" alt="sun" id="theme-icon">
          </button>
        </div>
        <div class="card-tab-container">
          <div class="tabs-section">
            <h1 class="heading">Extension List</h1>
            <div class="tabs-container">
              <button class=" tabs-buttons" id="all">All</button>
              <button class=" tabs-buttons" id="active">Active</button>
              <button class=" tabs-buttons" id="inactive">Inactive</button>
            </div>
          </div>
          <div class="grid grid-col-1 sm:grid-cols-3 gap-4" id="extensions-grid">
            <script src="script.js"></script>
          </div>
        </div>
      </div>
    </div>
  </section>

</html>
